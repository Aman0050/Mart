version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: nexmarto_web
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.yourdomain.com
      - NEXT_PUBLIC_FRONTEND_URL=https://yourdomain.com
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - nexmarto_network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: nexmarto_api
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://nexmarto:supersecurepassword@db:5432/nexmarto?schema=public
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=https://yourdomain.com
      - ADMIN_URL=https://admin.yourdomain.com
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexmarto_network

  db:
    image: postgres:15-alpine
    container_name: nexmarto_db
    restart: always
    environment:
      POSTGRES_USER: nexmarto
      POSTGRES_PASSWORD: supersecurepassword
      POSTGRES_DB: nexmarto
    volumes:
      - nexmarto_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexmarto"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexmarto_network

  redis:
    image: redis:7-alpine
    container_name: nexmarto_redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - nexmarto_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexmarto_network

  nginx:
    image: nginx:alpine
    container_name: nexmarto_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web
      - api
    networks:
      - nexmarto_network

networks:
  nexmarto_network:
    driver: bridge

volumes:
  nexmarto_pgdata:
  nexmarto_redisdata:
