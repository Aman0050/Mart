version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nexmarto_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexmarto_dev
      POSTGRES_USER: nexmarto
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexmarto -d nexmarto_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexmarto_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NestJS API ──────────────────────────────────
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile.dev
    container_name: nexmarto_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://nexmarto:password@postgres:5432/nexmarto_dev
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
      ADMIN_URL: http://localhost:3001
    ports:
      - '4000:4000'
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/apps/api/node_modules
    command: npm run dev

  # ── Next.js Web ─────────────────────────────────
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile.dev
    container_name: nexmarto_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - '3000:3000'
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/apps/web/node_modules
      - /app/apps/web/.next

  # ── Next.js Admin ───────────────────────────────
  admin:
    build:
      context: .
      dockerfile: ./apps/admin/Dockerfile.dev
    container_name: nexmarto_admin
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_APP_URL: http://localhost:3001
    ports:
      - '3001:3001'
    volumes:
      - ./apps/admin:/app/apps/admin
      - ./packages:/app/packages
      - /app/apps/admin/node_modules
      - /app/apps/admin/.next

  # ── Nginx Reverse Proxy ─────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nexmarto_nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
      - admin
    ports:
      - '80:80'
    volumes:
      - ./infrastructure/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  redis_data:
